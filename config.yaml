project:
  name: "ML_Trading_Bot_v1"
  version: "1.0.0"

mt5:
  login: 104105009
  password: "0oOo_vKi"
  server: "MetaQuotes-Demo"
  host: "127.0.0.1"
  port: 5555
  path: '/Applications/MetaTrader 5.app/Contents/MacOS/MetaTrader 5'

trading:
  symbol: "EURUSD"
  # 🚀 КЛЮЧОВІ ПАРАМЕТРИ ДЛЯ SHIFT
  target_minutes: 240      # Модель завжди прогнозує на 20 хвилин вперед
  timeframe_minutes: 5    # Вкажи 5, якщо файл даних M5

  # Асиметричні пороги (якщо SELL сильніший за BUY)
  threshold_buy: 0.60
  threshold_sell: 0.62

  risk_per_trade: 0.01    # 1% ризику на угоду
  horizon: 20             # Дефолтний горизонт у барах для M1

  max_volatility: 0.0005  # 🚀 Фільтр: не входимо, якщо волатильність вища за цю
  use_breakeven: true     # 🛡 Вмикаємо захист
  be_threshold_pct: 0.5

model:
  type: "xgboost"
  n_estimators: 150       # Трохи менше дерев для кращої генералізації
  max_depth: 4            # 🚀 Глибина 4 — ідеально, щоб бачити патерни Price Action
  learning_rate: 0.05
  test_size: 0.2

backtest:
  initial_balance: 1000
  spread: 0.00012         # 1.2 пункти (реалістично)
  sl_points: 150          # 10 пунктів (співвідношення 1.25 до 1)
  tp_points: 80         # 8 пунктів (швидкий тейк, як на Mac)

paths:
  data_dir: "./data"
  log_dir: "./logs"
  models_dir: "./models"
  data_path: "./data/eurusd_m5.parquet"